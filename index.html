    <style>

        .processing-card .spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .processing-card .msg { font-size: 0.95rem; color: #333; line-height: 1.4; padding: 0 4px; }
    </style>
</head>
<body>
<div id="library-screen" class="screen">
    <header><div><h1>Mi Biblioteca</h1><p class="subtitle">Toca un libro para leer · Sube tus ePub</p></div></header>
    <div id="book-list"></div>
    <button id="upload-btn-fab" title="Añadir libro">+</button>
    <input type="file" id="file-input" accept=".epub">
    <div id="processing-overlay"><div class="processing-card"><div class="spinner"></div><p class="msg" id="proc-msg">Procesando...</p></div></div>
</div>

<div id="reader-screen" class="screen hidden">
    <div id="reader-header">
        <div class="header-row"><div class="header-col left"><span id="device-time">--:--</span></div><div class="header-col right"><span class="time-stat" id="info-center">--</span></div></div>
        <div class="header-row"><div class="header-col left"><span class="chapter-title-header" id="header-chapter-title">--</span></div><div class="header-col right"><div class="stat-group"><span class="stat-side bold-stat" id="ind-pages-left-chapter">--</span><span class="stat-center" id="info-percent">--</span><span class="stat-side bold-stat" id="info-pages-left">--</span></div></div></div>
        <div id="progress-bar-container"><div id="progress-bar-fill"></div><div id="chapter-markers"></div></div>
    </div>
    <div id="options-panel">
        <div id="options-buttons">
            <button class="opt-btn" id="btn-bookmarks" title="Marcadores">⚐</button>
            <button class="opt-btn" id="btn-chapters" title="Capítulos">☰</button>
            <button class="opt-btn" id="btn-back-library" title="Volver a la biblioteca">⌘</button>
        </div>
        <div id="search-row">
            <div class="input-wrapper"><input type="text" id="search-input" placeholder="Buscar..." /><button class="clear-input-btn" id="clear-search-btn" title="Borrar">✕</button></div>
            <button id="btn-search-results" title="Buscar">⌕</button>
        </div>
    </div>
    <div id="reader-container"></div>
    <div id="search-results-overlay" class="search-results-overlay"><div class="search-results-modal" id="search-results-modal"><h3>Resultados</h3><div id="search-results-list"></div></div></div>
    <div id="chapters-overlay" class="chapters-overlay"><div class="chapters-modal" id="chapters-modal"><h3>Capítulos</h3><div id="chapters-list"></div></div></div>
    <div id="bookmarks-overlay" class="bookmarks-overlay"><div class="bookmarks-modal" id="bookmarks-modal"><h3>Marcadores</h3><button class="add-bookmark-btn" id="btn-add-bookmark">+ Añadir marcador</button><div class="bookmark-form" id="bookmark-form" style="display:none;"><div class="note-wrapper"><textarea id="bookmark-note" class="note-input" placeholder="Nota (opcional)..." rows="1"></textarea><button class="note-clear-btn" id="clear-note-btn" title="Borrar nota">✕</button></div><div class="bookmark-form-buttons"><button id="btn-cancel-bookmark">Cancelar</button><button class="primary" id="btn-save-bookmark">Guardar</button></div></div><div id="bookmarks-list"></div></div></div>
</div>

<script>

    function openDB() { return new Promise((resolve, reject) => { const req = indexedDB.open(DB_NAME, 1); req.onupgradeneeded = e => { const d = e.target.result; if (!d.objectStoreNames.contains('books')) d.createObjectStore('books', { keyPath: 'id' }); if (!d.objectStoreNames.contains('progress')) d.createObjectStore('progress', { keyPath: 'bookId' }); if (!d.objectStoreNames.contains('bookmarks')) { const s = d.createObjectStore('bookmarks', { keyPath: 'id', autoIncrement: true }); s.createIndex('bookId', 'bookId', { unique: false }); } }; req.onsuccess = e => { db = e.target.result; resolve(db); }; req.onerror = () => reject(req.error); }); }

    async function processEpub(arrayBuffer) {
        const zip = await JSZip.loadAsync(arrayBuffer);
        const containerFile = zip.file('META-INF/container.xml');

        const rootfile = containerDoc.querySelector('rootfile[full-path]');
        if (!rootfile) throw new Error('No se encontró <rootfile>');
        const opfPath = rootfile.getAttribute('full-path');
        const opfFile = zip.file(opfPath);
        if (!opfFile) throw new Error('Falta OPF: '+opfPath);
        const opfXml = await opfFile.async('string');
        const opfDoc = new DOMParser().parseFromString(opfXml,'application/xml');
        const opfDir = opfPath.substring(0, opfPath.lastIndexOf('/')+1);
        const titleEl = opfDoc.querySelector('metadata > dc\\:title, metadata > title');

        const manifestItems = {};

                opfDir + cleanSrc,
                cleanSrc.replace(/^\.\//, ''),

            }

                    const blob = await imgFile.async('blob');

        }

            html = fixInternalLinks(html);
            const text = stripHtml(html);
            const charCount = text.length;
            const wordCount = text.split(/\s+/).filter(w => w.length > 0).length;

            const normHref = item.href.split('#')[0].trim();

        const coverMeta = opfDoc.querySelector('meta[name="cover"]');

        if (!coverId) { const coverItem = opfDoc.querySelector('item[properties="cover-image"]'); if (coverItem) coverId = coverItem.getAttribute('id'); }
        if (coverId && manifestItems[coverId]) { coverHref = manifestItems[coverId].href; coverDataUrl = await resolveImageDataUrl(coverHref); coverBase64 = coverDataUrl; }
        if (!coverBase64) { for (const item of Object.values(manifestItems)) { if (item.mediaType && item.mediaType.startsWith('image/')) { const tryCover = await resolveImageDataUrl(item.href); if (tryCover) { coverBase64 = tryCover; coverDataUrl = tryCover; coverHref = item.href; break; } } } }

    }

    $searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') { const term = $searchInput.value.trim(); performSearch(term); $searchResultsOverlay.classList.add('active'); } });
    $searchResultsOverlay.addEventListener('click', e => { if (e.target === $searchResultsOverlay) $searchResultsOverlay.classList.remove('active'); });

    $btnChapters.addEventListener('click', () => {
        if (!currentBookData?.structure?.sections) return;
        const sections = currentBookData.structure.sections;
        const totalPages = currentBookData.structure.totalPages || 1;
        $chaptersList.innerHTML = '';
        const chapters = [];
        let currentTitle = null, chapterStartPage = 0;
        for (const sec of sections) {
            if (sec.title && sec.title !== currentTitle) {
                if (currentTitle !== null) chapters.push({ title: currentTitle, startPage: chapterStartPage });
                currentTitle = sec.title; chapterStartPage = sec.globalStartPage;
            }
        }
        if (currentTitle !== null) chapters.push({ title: currentTitle, startPage: chapterStartPage });
        if (chapters.length === 0 || chapters[0].startPage > 0) {
            const portadaDiv = document.createElement('div'); portadaDiv.className = 'chapter-item';
            portadaDiv.innerHTML = `<span class="chapter-title">Portada</span><span class="chapter-page"><span>${totalPages}</span><span style="margin-left:12px;">0%</span></span>`;
            portadaDiv.addEventListener('click', () => { $readerContainer.scrollTo({ top: 0, behavior:'smooth' }); $chaptersOverlay.classList.remove('active'); hideOptionsPanel(); });
            $chaptersList.appendChild(portadaDiv);
        }
        chapters.forEach(ch => {
            const div = document.createElement('div'); div.className = 'chapter-item';
            const pagesLeft = Math.max(0, totalPages - ch.startPage);
            const percent = Math.round((ch.startPage / totalPages) * 100);
            div.innerHTML = `<span class="chapter-title">${escapeHtml(ch.title)}</span><span class="chapter-page"><span>${pagesLeft}</span><span style="margin-left:12px;">${percent}%</span></span>`;
            div.addEventListener('click', () => {
                const firstSec = sections.find(s => s.title === ch.title);
                if (firstSec) {
                    const markers = $readerContainer.querySelectorAll('.chapter-marker');
                    if (markers[firstSec.index]) {
                        const top = markers[firstSec.index].getBoundingClientRect().top - $readerContainer.getBoundingClientRect().top + $readerContainer.scrollTop;
                        $readerContainer.scrollTo({ top, behavior:'smooth' });
                    }
                }
                $chaptersOverlay.classList.remove('active'); hideOptionsPanel();
            });
            $chaptersList.appendChild(div);
        });
        $chaptersOverlay.classList.add('active');
    });
    $chaptersOverlay.addEventListener('click', e => { if (e.target === $chaptersOverlay) $chaptersOverlay.classList.remove('active'); });

    function autoResizeTextarea() { const textarea = $bookmarkNote; textarea.style.height = 'auto'; textarea.style.height = (textarea.scrollHeight) + 'px'; }
    async function renderBookmarks() { if (!currentBookId) return; const bookmarks = await dbGetBookmarks(currentBookId); $bookmarksList.innerHTML = ''; if (bookmarks.length === 0) { $bookmarksList.innerHTML = '<p style="text-align:center;color:#999;">No hay marcadores</p>'; return; } const table = document.createElement('table'); table.className = 'bookmark-table'; bookmarks.forEach(bm => { const row = table.insertRow(); const cellPage = row.insertCell(); cellPage.textContent = `Pág. ${bm.globalPage}`; cellPage.className = 'bm-page'; const cellNote = row.insertCell(); cellNote.textContent = bm.note || ''; cellNote.className = bm.note ? 'bm-note' : ''; if (!bm.note) cellNote.style.color = '#aaa'; const cellActions = row.insertCell(); cellActions.className = 'bm-actions'; const actionBtn = document.createElement('button'); const isEditing = (editingBookmarkId === bm.id); actionBtn.innerHTML = isEditing ? '×' : '✎'; actionBtn.title = isEditing ? 'Eliminar marcador' : 'Editar nota'; actionBtn.addEventListener('click', async e => { e.stopPropagation(); if (isEditing) { await dbDeleteBookmark(bm.id); editingBookmarkId = null; $bookmarkForm.style.display = 'none'; autoResizeTextarea(); } else { editingBookmarkId = bm.id; $bookmarkNote.value = bm.note || ''; $clearNoteBtn.classList.toggle('visible', bm.note && bm.note.length > 0); autoResizeTextarea(); $bookmarkForm.style.display = 'flex'; $bookmarkNote.focus(); } renderBookmarks(); }); cellActions.appendChild(actionBtn); row.addEventListener('click', () => { const totalPages = currentBookData?.structure?.totalPages || 1; const scrollTarget = (bm.globalPage / totalPages) * $readerContainer.scrollHeight; $readerContainer.scrollTo({ top: scrollTarget, behavior:'smooth' }); $bookmarksOverlay.classList.remove('active'); hideOptionsPanel(); }); }); $bookmarksList.appendChild(table); }

    $btnBookmarks.addEventListener('click', () => { editingBookmarkId = null; $bookmarkForm.style.display = 'none'; renderBookmarks(); $bookmarksOverlay.classList.add('active'); });
    $btnAddBookmark.addEventListener('click', () => { editingBookmarkId = null; $bookmarkNote.value = ''; $clearNoteBtn.classList.remove('visible'); autoResizeTextarea(); $bookmarkForm.style.display = 'flex'; $bookmarkNote.focus(); renderBookmarks(); });
    $btnCancelBookmark.addEventListener('click', () => { editingBookmarkId = null; $bookmarkForm.style.display = 'none'; $bookmarkNote.value = ''; autoResizeTextarea(); renderBookmarks(); });
    $btnSaveBookmark.addEventListener('click', async () => { const note = $bookmarkNote.value.trim(); if (editingBookmarkId) { await dbUpdateBookmark(editingBookmarkId, note); editingBookmarkId = null; } else { const globalPage = lastRawData.globalPage > 0 ? lastRawData.globalPage : 1; await dbAddBookmark({ bookId: currentBookId, globalPage, note }); } $bookmarkForm.style.display = 'none'; $bookmarkNote.value = ''; autoResizeTextarea(); renderBookmarks(); });
    $bookmarksOverlay.addEventListener('click', e => { if (e.target === $bookmarksOverlay) { $bookmarksOverlay.classList.remove('active'); $bookmarkForm.style.display = 'none'; editingBookmarkId = null; renderBookmarks(); } });

    $btnBackLibrary.addEventListener('click', () => { if (saveTimer) { clearTimeout(saveTimer); if (lastRawData.globalPage > 0 && currentBookId) dbSaveProgress(currentBookId, { globalPage: lastRawData.globalPage, spineIndex: lastRawData.chapterIdx, pageInChapter: lastRawData.chapterPage, scrollTop: $readerContainer.scrollTop, totalPages: currentBookData?.structure?.totalPages || 0 }); } closeReader(); });

    $uploadFab.addEventListener('click', () => $fileInput.click());
    $fileInput.addEventListener('change', async e => { const file = e.target.files[0]; if (!file) return; if (!file.name.toLowerCase().endsWith('.epub')) { alert('Solo archivos .epub'); $fileInput.value = ''; return; } const book = await uploadAndProcessBook(file); $fileInput.value = ''; if (book) renderLibrary(); });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', async e => { e.preventDefault(); const file = e.dataTransfer.files[0]; if (file && file.name.endsWith('.epub')) { const book = await uploadAndProcessBook(file); if (book) renderLibrary(); } });
    window.addEventListener('beforeunload', () => { if (saveTimer && currentBookId && lastRawData.globalPage > 0) { clearTimeout(saveTimer); dbSaveProgress(currentBookId, { globalPage: lastRawData.globalPage, spineIndex: lastRawData.chapterIdx, pageInChapter: lastRawData.chapterPage, scrollTop: $readerContainer.scrollTop, totalPages: currentBookData?.structure?.totalPages || 0 }); } });

    (async () => { await openDB(); await renderLibrary(); console.log('📚 HTML ePub Reader v91 listo'); })().catch(err => console.error('Error inicial:', err));
})();
</script>
