<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lector ePub · v43 (porcentaje igual al tiempo)</title>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js">
    </script>

    <style>
        :root {
            --bg: #e8e5df;
            --reader-bg: #f5f5f5;
            --reader-bar: #eaeaea;
            --reader-border: #d0d0d0;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #5c5c5c;
            --accent: #c75b39;
            --accent-light: #e8c4b8;
            --radius: 14px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --progress-height: 4px;
            --buttons-height: 46px;
            --search-row-height: 40px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; width: 100%; overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--reader-bar); color: var(--text);
            -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
        }

        .screen {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            transition: opacity .25s, transform .25s;
        }
        .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }
        #library-screen { z-index: 1; }
        #reader-screen { z-index: 2; background: var(--reader-bg); }
        #processing-overlay {
            z-index: 10; background: rgba(232, 229, 223, 0.75);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity .3s;
            position: absolute; inset: 0;
        }
        #processing-overlay.active { opacity: 1; pointer-events: all; }

        #library-screen header {
            padding: 18px 20px 10px; flex-shrink: 0; background: var(--surface);
            border-bottom: 1px solid var(--reader-border);
            box-shadow: 0 2px 12px rgba(0,0,0,0.07); position: sticky; top: 0; z-index: 2;
        }
        #library-screen header h1 { font-size: 1.6rem; font-weight: 700; }
        #library-screen header .subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px; }

        #book-list {
            flex: 1; overflow-y: auto; padding: 16px 16px 90px;
            display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch;
        }
        #book-list:empty::after {
            content: '📚 Aún no has subido ningún libro.\a Toca el botón + para añadir uno.';
            display: block; text-align: center; color: #aaa; font-size: 0.95rem;
            padding: 50px 30px; white-space: pre-line; line-height: 1.6;
        }

        .book-card {
            background: var(--surface); border-radius: var(--radius); padding: 16px;
            display: flex; gap: 14px; align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04); cursor: pointer;
            transition: box-shadow .2s, transform .15s; border: 1px solid transparent; position: relative;
        }
        .book-card:active { transform: scale(0.985); box-shadow: 0 0 0 3px var(--accent-light); border-color: var(--accent); }
        .book-card .cover {
            width: 50px; height: 70px; border-radius: 6px; background: #e8e2d8;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; overflow: hidden;
        }
        .book-card .cover img { width: 100%; height: 100%; object-fit: cover; }
        .book-card .info { flex: 1; min-width: 0; }
        .book-card .info .title { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .book-card .info .author { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; }
        .book-card .info .progress-bar-wrap { margin-top: 8px; height: 4px; background: #e8e2d8; border-radius: 4px; overflow: hidden; }
        .book-card .info .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s; }
        .book-card .info .progress-text { font-size: 0.7rem; color: var(--text-secondary); margin-top: 3px; }
        .book-card .delete-btn {
            position: absolute; top: 8px; right: 8px; width: 28px; height: 28px;
            border-radius: 50%; border: none; background: transparent; color: #cbb;
            font-size: 1.2rem; cursor: pointer; z-index: 2;
        }

        #upload-btn-fab {
            position: fixed; bottom: calc(24px + var(--safe-bottom)); right: 20px;
            width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #fff;
            border: none; font-size: 1.8rem; cursor: pointer;
            box-shadow: 0 4px 16px rgba(199,91,57,0.35); z-index: 5;
            display: flex; align-items: center; justify-content: center;
        }
        #file-input { display: none; }

        /* ========== LECTOR ========== */
        #reader-header {
            flex-shrink: 0; background: var(--reader-bar);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; height: 25px;
            border-bottom: 1px solid var(--reader-border); box-shadow: none; z-index: 4;
            position: relative;
        }
        #header-left {
            font-weight: 700; font-size: 0.7rem; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 35%; display: flex; align-items: center; height: 100%;
            z-index: 2;
        }
        #header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem; color: var(--text-secondary);
            white-space: nowrap; font-weight: 400;
            z-index: 1;
            display: flex; align-items: center; height: 100%;
        }
        #header-right {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.65rem; color: var(--text); white-space: nowrap; height: 100%;
            z-index: 2;
        }
        #header-right .stat-bold { font-weight: 700; }
        #ind-percent { font-weight: 400; font-size: 0.65rem; color: var(--text-secondary); }

        #reader-container {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative;
            padding: 16px 18px; padding-bottom: calc(var(--progress-height) + var(--safe-bottom));
            font-family: 'Georgia', 'Palatino Linotype', serif; color: #1f1f1f;
            width: 100%; margin: 0 auto; word-wrap: break-word; overflow-x: hidden;
            background: var(--reader-bg); scrollbar-width: none; -ms-overflow-style: none;
            transition: padding-bottom 0.3s ease;
        }
        #reader-container.buttons-visible { padding-bottom: calc(var(--progress-height) + var(--buttons-height) + var(--safe-bottom)); }
        #reader-container.search-visible { padding-bottom: calc(var(--progress-height) + var(--buttons-height) + var(--search-row-height) + var(--safe-bottom)); }
        #reader-container::-webkit-scrollbar { display: none; }

        .book-content { font-size: 1.05rem; line-height: 1.7 !important; word-wrap: break-word; overflow-wrap: break-word; max-width: 100%; overflow-x: hidden; }
        .book-content * { max-width: 100%; height: auto; box-sizing: border-box; }
        .book-content p { margin-bottom: 0.7em !important; font-size: 1.15rem !important; line-height: inherit !important; text-indent: 35px !important; text-align: justify !important; }
        #reader-container .book-content h1, #reader-container .book-content h2, #reader-container .book-content h3, #reader-container .book-content h4 {
            font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 700;
            margin-top: 2.0em !important; margin-bottom: 2.0em !important;
        }
        .book-content img { max-width: 100% !important; height: auto !important; border-radius: 6px; margin: 0.8em 0; }
        .book-content blockquote { border-left: 3px solid var(--accent-light); padding-left: 14px; margin: 0.8em 0; color: #555; font-style: italic; }

        .chapter-marker { height: 1px; margin: 0; padding: 0; background: transparent; }

        /* Footer fijo */
        #reader-footer {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--reader-bar);
            border-top: 1px solid var(--reader-border); z-index: 10;
            display: flex; flex-direction: column; padding-bottom: var(--safe-bottom); margin: 0;
        }
        #progress-bar-container { height: var(--progress-height); background: #ddd; flex-shrink: 0; position: relative; }
        #progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; border-radius: 2px; position: absolute; top: 0; left: 0; }
        #chapter-markers { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
        .chapter-marker-item { position: absolute; top: 0; width: 1px; height: 100%; background-color: #999; opacity: 0.5; }
        #footer-collapsible { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: var(--reader-bar); }
        #footer-collapsible.expanded { max-height: var(--buttons-height); }
        #footer-collapsible.search-active { max-height: calc(var(--buttons-height) + var(--search-row-height)); }
        #footer-buttons { display: flex; align-items: center; justify-content: space-around; padding: 4px 0; }
        .footer-btn { background: transparent; border: none; font-size: 1.4rem; color: var(--text); padding: 2px 8px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .footer-btn span { font-size: 0.75rem; }
        #search-row { display: flex; align-items: center; justify-content: center; padding: 4px 8px; gap: 6px; background: var(--reader-bar); }
        #search-input { flex: 1; border: 1px solid var(--reader-border); border-radius: 6px; padding: 4px 8px; font-size: 0.85rem; background: #fff; }

        /* Panel de resultados de búsqueda (overlay) */
        .search-results-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 20;
            display: flex; align-items: flex-start; justify-content: flex-start; padding: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .search-results-overlay.active { opacity: 1; pointer-events: all; }
        .search-results-modal {
            background: var(--surface); border-radius: var(--radius); width: 90%; max-width: 400px; max-height: 70%;
            overflow-y: auto; padding: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); margin-right: auto; margin-top: 40px;
        }
        .search-results-modal h3 { margin-bottom: 8px; font-size: 1rem; text-align: center; }
        .search-result-item {
            padding: 10px 8px; border-bottom: 1px solid #eee; cursor: pointer;
            font-size: 0.85rem; color: var(--text); line-height: 1.4; display: flex; flex-direction: column; gap: 4px;
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item .highlight { background-color: #ffeb3b; font-weight: bold; }
        .search-result-item .meta { font-size: 0.7rem; color: var(--text-secondary); align-self: flex-end; }

        /* Capítulos overlay */
        .chapters-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 20;
            display: flex; align-items: flex-start; justify-content: flex-start; padding: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .chapters-overlay.active { opacity: 1; pointer-events: all; }
        .chapters-modal {
            background: var(--surface); border-radius: var(--radius); width: 75%; max-width: 360px; max-height: 80%;
            overflow-y: auto; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); margin-right: auto; margin-top: 40px;
        }
        .chapters-modal h3 { margin-bottom: 12px; font-size: 1rem; text-align: center; }
        .chapter-item {
            padding: 12px 8px; border-bottom: 1px solid #eee; cursor: pointer;
            font-size: 0.9rem; color: var(--text); display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
        }
        .chapter-item:last-child { border-bottom: none; }
        .chapter-item .chapter-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chapter-item .chapter-page { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; }

        .processing-card {
            background: var(--surface); border-radius: var(--radius); padding: 28px 24px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25); max-width: 340px; width: 85%;
            word-wrap: break-word; overflow-wrap: break-word; line-height: 1.5; z-index: 11;
        }
        .processing-card .spinner {
            width: 40px; height: 40px; border: 3px solid #eee; border-top-color: var(--accent);
            border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .processing-card .msg { font-size: 0.95rem; color: #333; line-height: 1.4; padding: 0 4px; }
    </style>
</head>
<body>
    <div id="library-screen" class="screen">
        <header>
            <h1>📖 Mi Biblioteca</h1>
            <p class="subtitle">Toca un libro para leer · Sube tus ePub</p>
        </header>
        <div id="book-list"></div>
        <button id="upload-btn-fab" title="Añadir libro">+</button>
        <input type="file" id="file-input" accept=".epub">
        <div id="processing-overlay">
            <div class="processing-card">
                <div class="spinner"></div>
                <p class="msg" id="proc-msg">Procesando...</p>
            </div>
        </div>
    </div>

    <div id="reader-screen" class="screen hidden">
        <div id="reader-header">
            <div id="header-left" title="Título del capítulo"></div>
            <div id="header-center">--</div>
            <div id="header-right">
                <span class="stat-bold" id="ind-pages-left-chapter">--</span>
                <span class="stat-normal" id="ind-percent">--</span>
                <span class="stat-bold" id="ind-pages-left-book">--</span>
            </div>
        </div>
        <div id="reader-container"></div>
        <div id="reader-footer">
            <div id="progress-bar-container">
                <div id="progress-bar-fill"></div>
                <div id="chapter-markers"></div>
            </div>
            <div id="footer-collapsible">
                <div id="footer-buttons">
                    <button class="footer-btn" id="btn-back-library" title="Volver a la biblioteca">← <span>Bib.</span></button>
                    <button class="footer-btn" id="btn-search" title="Buscar">🔍</button>
                    <button class="footer-btn" id="btn-chapters" title="Índice de capítulos">☰ <span>Cap.</span></button>
                </div>
                <div id="search-row">
                    <input type="text" id="search-input" placeholder="Buscar..." />
                    <button class="footer-btn" id="btn-search-results" style="font-size:1rem;">🔍</button>
                    <button class="footer-btn" id="btn-search-close" style="font-size:1rem;">✕</button>
                </div>
            </div>
        </div>
        <div id="search-results-overlay" class="search-results-overlay">
            <div class="search-results-modal" id="search-results-modal">
                <h3>Resultados</h3>
                <div id="search-results-list"></div>
            </div>
        </div>
        <div id="chapters-overlay" class="chapters-overlay">
            <div class="chapters-modal" id="chapters-modal">
                <h3>Capítulos</h3>
                <div id="chapters-list"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const $ = (sel) => document.querySelector(sel);
            const $libraryScreen = $('#library-screen');
            const $readerScreen = $('#reader-screen');
            const $bookList = $('#book-list');
            const $fileInput = $('#file-input');
            const $uploadFab = $('#upload-btn-fab');
            const $readerContainer = $('#reader-container');
            const $footerCollapsible = $('#footer-collapsible');
            const $headerLeft = $('#header-left');
            const $headerCenter = $('#header-center');
            const $indPagesLeftChapter = $('#ind-pages-left-chapter');
            const $indPercent = $('#ind-percent');
            const $indPagesLeftBook = $('#ind-pages-left-book');
            const $processingOverlay = $('#processing-overlay');
            const $procMsg = $('#proc-msg');
            const $progressBarFill = $('#progress-bar-fill');
            const $chapterMarkers = $('#chapter-markers');
            const $btnBackLibrary = $('#btn-back-library');
            const $btnChapters = $('#btn-chapters');
            const $btnSearch = $('#btn-search');
            const $searchRow = $('#search-row');
            const $searchInput = $('#search-input');
            const $btnSearchResults = $('#btn-search-results');
            const $btnSearchClose = $('#btn-search-close');
            const $searchResultsOverlay = $('#search-results-overlay');
            const $searchResultsList = $('#search-results-list');
            const $chaptersOverlay = $('#chapters-overlay');
            const $chaptersList = $('#chapters-list');

            // ---------- IndexedDB ----------
            const DB_NAME = 'epub_reader_v43';
            const DB_VERSION = 1;
            let db = null;

            function openDB() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, DB_VERSION);
                    req.onupgradeneeded = (e) => {
                        const d = e.target.result;
                        if (!d.objectStoreNames.contains('books')) d.createObjectStore('books', { keyPath: 'id' });
                        if (!d.objectStoreNames.contains('progress')) d.createObjectStore('progress', { keyPath: 'bookId' });
                    };
                    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
                    req.onerror = () => reject(req.error);
                });
            }

            function dbAddBook(bookData) { return new Promise((resolve, reject) => { const tx = db.transaction('books','readwrite'); tx.objectStore('books').put(bookData); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); }
            function dbGetBook(id) { return new Promise((resolve, reject) => { const tx = db.transaction('books','readonly'); const req = tx.objectStore('books').get(id); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error); }); }
            function dbGetAllBooks() { return new Promise((resolve, reject) => { const tx = db.transaction('books','readonly'); const req = tx.objectStore('books').getAll(); req.onsuccess = () => { const books = req.result || []; books.sort((a,b) => (b.dateAdded||0)-(a.dateAdded||0)); resolve(books); }; req.onerror = () => reject(req.error); }); }
            function dbDeleteBook(id) { return new Promise((resolve, reject) => { const tx = db.transaction(['books','progress'],'readwrite'); tx.objectStore('books').delete(id); tx.objectStore('progress').delete(id); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); }
            function dbSaveProgress(bookId, data) { return new Promise((resolve, reject) => { const tx = db.transaction('progress','readwrite'); tx.objectStore('progress').put({ bookId, ...data, updatedAt: Date.now() }); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); }
            function dbGetProgress(bookId) { return new Promise((resolve, reject) => { const tx = db.transaction('progress','readonly'); const req = tx.objectStore('progress').get(bookId); req.onsuccess = () => resolve(req.result || null); req.onerror = () => reject(req.error); }); }

            // ---------- Utilidades ----------
            function generateId() { return 'b_'+Date.now()+'_'+Math.random().toString(36).substr(2,6); }
            function stripHtml(html) { const doc = new DOMParser().parseFromString(html,'text/html'); return (doc.body.textContent||'').replace(/\s+/g,' ').trim(); }
            function extractFirstHeading(html) { const doc = new DOMParser().parseFromString(html,'text/html'); const h = doc.querySelector('h1,h2,h3,h4'); return h ? h.textContent.trim() : null; }
            function splitIntoPages(text, charsPerPage=2000) { const pages = []; if (!text?.length) return ['']; let rem = text; while (rem.length > charsPerPage) { let cut = charsPerPage; const slice = rem.substr(charsPerPage,120); const m = slice.match(/[\s.,;:!?¡¿—\-'"»)]/); if (m?.index !== undefined) cut = charsPerPage + m.index + 1; pages.push(rem.substring(0,cut).trim()); rem = rem.substring(cut).trim(); } if (rem) pages.push(rem.trim()); return pages.length ? pages : ['']; }
            function blobToBase64(blob) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.onloadend = () => resolve(reader.result); reader.onerror = reject; reader.readAsDataURL(blob); }); }

            // ---------- Procesar ePub ----------
            async function processEpub(arrayBuffer) {
                const zip = await JSZip.loadAsync(arrayBuffer);
                const containerFile = zip.file('META-INF/container.xml');
                if (!containerFile) throw new Error('Falta container.xml');
                const containerXml = await containerFile.async('string');
                const containerDoc = new DOMParser().parseFromString(containerXml,'application/xml');
                const rootfile = containerDoc.querySelector('rootfile[full-path]');
                if (!rootfile) throw new Error('No se encontró <rootfile>');
                const opfPath = rootfile.getAttribute('full-path');

                const opfFile = zip.file(opfPath);
                if (!opfFile) throw new Error('Falta OPF: '+opfPath);
                const opfXml = await opfFile.async('string');
                const opfDoc = new DOMParser().parseFromString(opfXml,'application/xml');
                const opfDir = opfPath.substring(0, opfPath.lastIndexOf('/')+1);

                const titleEl = opfDoc.querySelector('metadata > dc\\:title, metadata > title');
                const authorEl = opfDoc.querySelector('metadata > dc\\:creator, metadata > creator');
                const bookTitle = titleEl ? titleEl.textContent.trim() : 'Libro sin título';
                const bookAuthor = authorEl ? authorEl.textContent.trim() : 'Autor desconocido';

                const manifestItems = {};
                opfDoc.querySelectorAll('manifest > item').forEach(item => { manifestItems[item.getAttribute('id')] = { href: item.getAttribute('href'), mediaType: item.getAttribute('media-type') }; });

                const spineItems = [];
                opfDoc.querySelectorAll('spine > itemref').forEach((ref, idx) => {
                    const idref = ref.getAttribute('idref');
                    if (manifestItems[idref]) spineItems.push({ index: idx, idref, href: manifestItems[idref].href, mediaType: manifestItems[idref].mediaType });
                });

                const hrefToIndex = new Map();
                spineItems.forEach((item, idx) => { let href = item.href.split('#')[0].trim(); hrefToIndex.set(href, idx); const bare = href.split('/').pop(); if (bare) hrefToIndex.set(bare, idx); });

                const spineToc = opfDoc.querySelector('spine')?.getAttribute('toc');
                let ncxPath = (spineToc && manifestItems[spineToc]) ? manifestItems[spineToc].href : null;
                if (!ncxPath) { for (const [, item] of Object.entries(manifestItems)) { if (item.mediaType === 'application/x-dtbncx+xml') { ncxPath = item.href; break; } } }
                let tocMap = {};
                if (ncxPath) {
                    try {
                        const ncxFile = zip.file(opfDir+ncxPath) || zip.file(ncxPath);
                        if (ncxFile) {
                            const ncxXml = await ncxFile.async('string');
                            const ncxDoc = new DOMParser().parseFromString(ncxXml,'application/xml');
                            ncxDoc.querySelectorAll('navPoint').forEach(np => {
                                const label = np.querySelector('navLabel > text');
                                const content = np.querySelector('content[src]');
                                if (label && content) tocMap[content.getAttribute('src').split('#')[0].trim()] = label.textContent.trim();
                            });
                        }
                    } catch(e) {}
                }

                let bookStyles = '';
                for (const [, item] of Object.entries(manifestItems)) {
                    if (item.mediaType === 'text/css') {
                        try { const cssFile = zip.file(opfDir+item.href) || zip.file(item.href); if (cssFile) { bookStyles += await cssFile.async('string') + '\n'; } } catch(e) {}
                    }
                }

                const imageCache = new Map();
                async function resolveImageDataUrl(src) {
                    if (imageCache.has(src)) return imageCache.get(src);
                    let cleanSrc = src;
                    if (cleanSrc.startsWith('../')) { const parts = opfDir.split('/').filter(p=>p.length>0); const srcParts = cleanSrc.split('/'); for (const part of srcParts) { if (part==='..') parts.pop(); else if (part!=='.') parts.push(part); } cleanSrc = parts.join('/'); }
                    else if (!cleanSrc.startsWith('http') && !cleanSrc.startsWith('/')) cleanSrc = opfDir + cleanSrc;
                    if (cleanSrc.startsWith('/')) cleanSrc = cleanSrc.substring(1);
                    let imgFile = zip.file(cleanSrc);
                    if (!imgFile) { const bareName = src.split('/').pop(); for (const fname of Object.keys(zip.files)) { if (fname.endsWith('/'+bareName) || fname===bareName) { imgFile = zip.file(fname); break; } } }
                    if (!imgFile) imgFile = zip.file(src) || zip.file(src.replace(/^\//,''));
                    if (imgFile) { try { const blob = await imgFile.async('blob'); const dataUrl = await blobToBase64(blob); imageCache.set(src, dataUrl); return dataUrl; } catch(e) { console.warn('Error imagen:', src, e); } }
                    return null;
                }

                function fixInternalLinks(html) {
                    return html.replace(/<a\s+[^>]*href\s*=\s*["']([^"']+)["'][^>]*>/gi, (match, href) => {
                        if (href.startsWith('http') || href.startsWith('#')) return match;
                        const cleanHref = href.split('#')[0].trim();
                        const bare = cleanHref.split('/').pop();
                        let targetIndex = hrefToIndex.get(cleanHref);
                        if (targetIndex === undefined) targetIndex = hrefToIndex.get(bare);
                        if (targetIndex !== undefined) return match.replace(/href\s*=\s*["'][^"']+["']/i, 'href="#"').replace('<a ', `<a data-chapter-link="${targetIndex}" `);
                        return match.replace(/href\s*=\s*["'][^"']+["']/i, 'href="#"');
                    });
                }

                const sections = [];
                let globalPage = 0;
                let totalWords = 0;
                for (let i = 0; i < spineItems.length; i++) {
                    const item = spineItems[i];
                    const fullHref = opfDir + item.href;
                    let htmlFile = zip.file(fullHref) || zip.file(item.href);
                    if (!htmlFile) { const name = item.href.split('/').pop(); for (const fname of Object.keys(zip.files)) { if (fname.endsWith('/'+name) || fname===name) { htmlFile = zip.file(fname); break; } } }
                    if (!htmlFile) { sections.push({ index:i, idref:item.idref, href:item.href, title:'Capítulo '+(i+1), pageCount:0, globalStartPage:globalPage, charCount:0, htmlContent:'' }); continue; }
                    let html = await htmlFile.async('string');
                    const imgRegex = /src=["']([^"']+\.(?:png|jpg|jpeg|gif|svg|webp))["']/gi;
                    const imgMatches = [...html.matchAll(imgRegex)];
                    for (const match of imgMatches) { const originalSrc = match[1]; const dataUrl = await resolveImageDataUrl(originalSrc); if (dataUrl) html = html.replace(match[0], `src="${dataUrl}"`); }
                    html = fixInternalLinks(html);
                    const text = stripHtml(html);
                    const charCount = text.length;
                    const wordCount = text.split(/\s+/).filter(w => w.length > 0).length;
                    totalWords += wordCount;
                    const normHref = item.href.split('#')[0].trim();
                    let title = tocMap[normHref] || tocMap[item.href] || extractFirstHeading(html);
                    if (!title || title.length < 1) title = 'Capítulo ' + (i+1);
                    const pages = splitIntoPages(text, 2000);
                    const pageCount = pages.length;
                    sections.push({ index:i, idref:item.idref, href:item.href, title, pageCount, globalStartPage:globalPage, charCount, htmlContent:html });
                    globalPage += pageCount;
                }

                let coverBase64 = null;
                const coverMeta = opfDoc.querySelector('meta[name="cover"]');
                let coverId = coverMeta ? coverMeta.getAttribute('content') : null;
                if (!coverId) { const coverItem = opfDoc.querySelector('item[properties="cover-image"]'); if (coverItem) coverId = coverItem.getAttribute('id'); }
                if (coverId && manifestItems[coverId]) { const coverHref = manifestItems[coverId].href; const coverDataUrl = await resolveImageDataUrl(coverHref); if (coverDataUrl) coverBase64 = coverDataUrl; }

                return { title: bookTitle, author: bookAuthor, coverBase64, totalPages: globalPage, totalSections: sections.length, totalWords, sections, bookStyles, processedAt: Date.now() };
            }

            // ---------- Subir y guardar ----------
            async function uploadAndProcessBook(file) {
                showProcessing('Leyendo archivo…');
                const arrayBuffer = await file.arrayBuffer();
                showProcessing('Analizando estructura e imágenes…');
                let structure;
                try { structure = await processEpub(arrayBuffer); } catch (err) { hideProcessing(); alert('Error al procesar: '+err.message); console.error(err); return null; }
                const bookData = { id: generateId(), title: structure.title, author: structure.author, coverBase64: structure.coverBase64, epubData: arrayBuffer, structure, dateAdded: Date.now() };
                showProcessing('Guardando…');
                try { await dbAddBook(bookData); } catch (err) { hideProcessing(); alert('Error al guardar: '+err.message); return null; }
                hideProcessing();
                return bookData;
            }

            function showProcessing(msg) { $procMsg.textContent = msg; $processingOverlay.classList.add('active'); }
            function hideProcessing() { $processingOverlay.classList.remove('active'); }

            // ---------- Biblioteca ----------
            async function renderLibrary() {
                const books = await dbGetAllBooks();
                $bookList.innerHTML = '';
                for (const book of books) {
                    const progress = await dbGetProgress(book.id);
                    const totalPages = book.structure?.totalPages || 0;
                    const currentPage = progress?.globalPage || 0;
                    const percent = totalPages ? Math.round((currentPage/totalPages)*100) : 0;
                    let coverHTML = '📘';
                    if (book.coverBase64) coverHTML = `<img src="${book.coverBase64}" alt="portada" onerror="this.parentElement.innerHTML='📘'">`;
                    const card = document.createElement('div'); card.className = 'book-card'; card.dataset.bookId = book.id;
                    card.innerHTML = `<div class="cover">${coverHTML}</div><div class="info"><div class="title">${escapeHtml(book.title)}</div><div class="author">${escapeHtml(book.author)}</div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${percent}%"></div></div><div class="progress-text">${totalPages ? `Pág. ${currentPage} de ${totalPages} (${percent}%)` : 'Sin procesar'}</div></div><button class="delete-btn" data-action="delete" aria-label="Eliminar">×</button>`;
                    card.addEventListener('click', (e) => { if (!e.target.closest('[data-action="delete"]')) openBookForReading(book.id); });
                    card.querySelector('.delete-btn').addEventListener('click', async (e) => { e.stopPropagation(); if (confirm(`¿Eliminar "${book.title}"?`)) { await dbDeleteBook(book.id); renderLibrary(); } });
                    $bookList.appendChild(card);
                }
            }

            function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

            // ---------- LECTOR ----------
            let currentBookId = null, currentBookData = null, sectionDOMRefs = [], lastRawData = { globalPage:-1, chapterIdx:-1, chapterPage:-1 };
            let saveTimer = null, isRestoring = false, scrollRAF = null, lastScroll = -1, bookStyleElement = null;
            let footerButtonsVisible = false, searchRowVisible = false, globalCharMapping = null;

            function updateContainerPadding() {
                const container = $readerContainer;
                container.classList.remove('buttons-visible','search-visible');
                if (footerButtonsVisible) { container.classList.add('buttons-visible'); if (searchRowVisible) container.classList.add('search-visible'); }
            }

            function renderChapterMarkers() {
                if (!currentBookData?.structure?.sections || !currentBookData.structure.totalPages) return;
                const totalPages = currentBookData.structure.totalPages, sections = currentBookData.structure.sections;
                $chapterMarkers.innerHTML = '';
                sections.forEach(sec => { if (sec.globalStartPage===0) return; const leftPercent = (sec.globalStartPage/totalPages)*100; const marker = document.createElement('div'); marker.className = 'chapter-marker-item'; marker.style.left = leftPercent+'%'; $chapterMarkers.appendChild(marker); });
            }

            function openBookForReading(bookId) {
                if (saveTimer) clearTimeout(saveTimer);
                if (scrollRAF) cancelAnimationFrame(scrollRAF);
                cleanupScrollDetection();
                if (bookStyleElement) { bookStyleElement.remove(); bookStyleElement = null; }
                $readerContainer.innerHTML = '';
                sectionDOMRefs = []; lastRawData = { globalPage:-1, chapterIdx:-1, chapterPage:-1 };
                isRestoring = false; lastScroll = -1; currentBookId = bookId;
                footerButtonsVisible = false; searchRowVisible = false;
                $footerCollapsible.classList.remove('expanded','search-active');
                $readerContainer.classList.remove('buttons-visible','search-visible');
                $searchRow.classList.remove('active'); $searchInput.value = '';

                dbGetBook(bookId).then(bookData => {
                    if (!bookData?.structure?.sections) { alert('El libro no tiene estructura válida.'); return; }
                    currentBookData = bookData;
                    globalCharMapping = []; let charCounter = 0;
                    bookData.structure.sections.forEach(sec => {
                        const pages = splitIntoPages(sec.htmlContent ? stripHtml(sec.htmlContent) : '', 2000);
                        pages.forEach((page, pIdx) => { globalCharMapping.push({ start: charCounter, end: charCounter + page.length, globalPage: sec.globalStartPage + pIdx + 1 }); charCounter += page.length; });
                    });

                    $libraryScreen.classList.add('hidden'); $readerScreen.classList.remove('hidden');
                    $headerLeft.textContent = ''; $indPagesLeftChapter.textContent = '--'; $indPercent.textContent = '--'; $indPagesLeftBook.textContent = '--'; $headerCenter.textContent = '--';
                    $progressBarFill.style.width = '0%';
                    renderChapterMarkers();

                    if (bookData.structure.bookStyles) { bookStyleElement = document.createElement('style'); bookStyleElement.textContent = `#reader-container .book-content { ${bookData.structure.bookStyles} }`; document.head.appendChild(bookStyleElement); }

                    let fullHTML = '<div class="book-content">';
                    bookData.structure.sections.forEach((sec, idx) => { fullHTML += `<div class="chapter-marker" data-chapter-index="${idx}" style="height:0;"></div>`; fullHTML += sec.htmlContent || `<p>${escapeHtml(sec.title)}</p>`; });
                    fullHTML += '</div>';
                    $readerContainer.innerHTML = fullHTML;

                    $readerContainer.addEventListener('click', (e) => {
                        const link = e.target.closest('a[data-chapter-link]'); if (!link) return;
                        e.preventDefault();
                        const targetIndex = parseInt(link.getAttribute('data-chapter-link'),10);
                        const markers = $readerContainer.querySelectorAll('.chapter-marker');
                        if (markers[targetIndex]) { const top = markers[targetIndex].getBoundingClientRect().top - $readerContainer.getBoundingClientRect().top + $readerContainer.scrollTop; $readerContainer.scrollTo({ top, behavior:'smooth' }); }
                    });

                    history.pushState({ screen:'reader', bookId }, '', '#reader-'+bookId);
                    setTimeout(() => { measureSectionPositions(); dbGetProgress(bookId).then(progress => { if (progress && progress.globalPage>0) { isRestoring = true; restoreScrollPosition(progress); } else updatePositionFromScroll(); }); setupScrollDetection(); }, 300);
                }).catch(err => { console.error('Error al abrir libro:', err); alert('Error al cargar el libro.'); });
            }

            function getGlobalPageFromCharIndex(charIndex) { if (!globalCharMapping) return { globalPage:1, percent:0 }; const total = currentBookData.structure.totalPages||1; for (const map of globalCharMapping) { if (charIndex >= map.start && charIndex < map.end) return { globalPage: map.globalPage, percent: Math.round((map.globalPage/total)*100) }; } return { globalPage:1, percent:0 }; }

            function measureSectionPositions() {
                if (!currentBookData?.structure?.sections) return;
                sectionDOMRefs = [];
                const markers = $readerContainer.querySelectorAll('.chapter-marker');
                markers.forEach(marker => {
                    const idx = parseInt(marker.dataset.chapterIndex,10);
                    const rect = marker.getBoundingClientRect();
                    const containerRect = $readerContainer.getBoundingClientRect();
                    const top = rect.top - containerRect.top + $readerContainer.scrollTop;
                    let nextMarker = marker.nextElementSibling;
                    while (nextMarker && !nextMarker.classList.contains('chapter-marker')) nextMarker = nextMarker.nextElementSibling;
                    let height;
                    if (nextMarker) { const nextRect = nextMarker.getBoundingClientRect(); height = (nextRect.top - containerRect.top + $readerContainer.scrollTop) - top; }
                    else height = $readerContainer.scrollHeight - top;
                    sectionDOMRefs.push({ index:idx, offsetTop:top, height: Math.max(height,100) });
                });
                if (sectionDOMRefs.length===0 && currentBookData.structure.sections.length>0) sectionDOMRefs.push({ index:0, offsetTop:0, height: $readerContainer.scrollHeight });
            }

            function findCurrentSection(scrollTop) { const container = $readerContainer; const clientHeight = container.clientHeight; const triggerY = clientHeight*0.33; for (let i=sectionDOMRefs.length-1; i>=0; i--) { if (scrollTop >= sectionDOMRefs[i].offsetTop - triggerY) return sectionDOMRefs[i]; } return sectionDOMRefs[0]||null; }

            function updatePositionFromScroll() {
                if (!currentBookData?.structure?.sections || isRestoring) return;
                const container = $readerContainer; const st = container.scrollTop; const sh = container.scrollHeight; const ch = container.clientHeight;
                if (sh <= ch) { updateIndicators(1,0,1); return; }
                const sec = findCurrentSection(st); if (!sec) return;
                const idx = sec.index; const sections = currentBookData.structure.sections; if (idx >= sections.length) return;
                const sData = sections[idx]; const start = sec.offsetTop; const height = sec.height||1;
                const progress = Math.max(0, Math.min(1, (st-start)/height));
                const pageInChapter = Math.min(Math.floor(progress*sData.pageCount)+1, sData.pageCount||1);
                const globalPage = sData.globalStartPage + pageInChapter;
                updateIndicators(Math.max(1, Math.min(globalPage, currentBookData.structure.totalPages||1)), idx, Math.max(1, pageInChapter));
                const totalPages = currentBookData.structure.totalPages||1; const percent = Math.round((globalPage/totalPages)*100);
                $progressBarFill.style.width = percent+'%';
            }

            function updateIndicators(gPage, chIdx, chPage) {
                const s = currentBookData?.structure; if (!s) return;
                const sec = s.sections[chIdx]; if (!sec) return;
                const chTotal = sec.pageCount||1; const chTitle = sec.title||'Capítulo '+(chIdx+1);
                const totalPages = s.totalPages||1;

                if (gPage===lastRawData.globalPage && chIdx===lastRawData.chapterIdx && chPage===lastRawData.chapterPage) return;
                lastRawData = { globalPage: gPage, chapterIdx: chIdx, chapterPage: chPage };

                const pagesLeftChapter = Math.max(1, chTotal - chPage + 1);
                const percent = Math.round((gPage/totalPages)*100);
                const pagesLeftBook = Math.max(0, totalPages - gPage);

                // Tiempo de lectura restante (formato X h Y m)
                const totalWords = s.totalWords || 0;
                const wordsRemaining = Math.floor(totalWords * (1 - percent/100));
                const totalMinutes = Math.ceil(wordsRemaining / 285);
                let timeText = '--';
                if (totalMinutes > 0) {
                    if (totalMinutes >= 60) {
                        const hours = Math.floor(totalMinutes / 60);
                        const mins = totalMinutes % 60;
                        timeText = `${hours} h ${mins} m`;
                    } else {
                        timeText = `${totalMinutes} m`;
                    }
                }
                $headerCenter.textContent = timeText;

                $headerLeft.textContent = chTitle;
                $indPagesLeftChapter.textContent = pagesLeftChapter;
                $indPercent.textContent = `${percent}%`;
                $indPagesLeftBook.textContent = pagesLeftBook;

                scheduleProgressSave(gPage, chIdx, chPage);
            }

            function scheduleProgressSave(gPage, chIdx, chPage) {
                clearTimeout(saveTimer);
                saveTimer = setTimeout(async () => {
                    if (!currentBookId) return;
                    const top = $readerContainer.scrollTop;
                    await dbSaveProgress(currentBookId, { globalPage:gPage, spineIndex:chIdx, pageInChapter:chPage, scrollTop:top, totalPages: currentBookData?.structure?.totalPages||0 });
                    try { localStorage.setItem('last_progress_v43_'+currentBookId, JSON.stringify({ gPage, chIdx, chPage, top, ts: Date.now() })); } catch(e) {}
                }, 1000);
            }

            function toggleFooter() {
                footerButtonsVisible = !footerButtonsVisible;
                if (footerButtonsVisible) $footerCollapsible.classList.add('expanded');
                else { $footerCollapsible.classList.remove('expanded','search-active'); searchRowVisible = false; $searchRow.classList.remove('active'); }
                updateContainerPadding();
            }

            function setupScrollDetection() {
                const container = $readerContainer;
                const scrollHandler = () => { if (scrollRAF) return; scrollRAF = requestAnimationFrame(() => { scrollRAF = null; const st = container.scrollTop; if (Math.abs(st-lastScroll)>2) { lastScroll = st; if (!isRestoring) updatePositionFromScroll(); } }); };
                container.addEventListener('scroll', scrollHandler, { passive:true }); container._scrollHandler = scrollHandler;
                const clickHandler = (e) => { if (e.target.closest('#reader-footer') || e.target.closest('#chapters-overlay') || e.target.closest('#search-results-overlay')) return; toggleFooter(); };
                container.addEventListener('click', clickHandler); container._clickHandler = clickHandler;
                window.addEventListener('resize', () => { clearTimeout(window._resizeTimer); window._resizeTimer = setTimeout(() => { measureSectionPositions(); updatePositionFromScroll(); }, 400); });
            }

            function cleanupScrollDetection() {
                const container = $readerContainer;
                if (container._scrollHandler) { container.removeEventListener('scroll', container._scrollHandler); container._scrollHandler = null; }
                if (container._clickHandler) { container.removeEventListener('click', container._clickHandler); container._clickHandler = null; }
                if (scrollRAF) cancelAnimationFrame(scrollRAF); clearTimeout(saveTimer); clearTimeout(window._resizeTimer);
                if (bookStyleElement) { bookStyleElement.remove(); bookStyleElement = null; }
            }

            async function restoreScrollPosition(progress) {
                await new Promise(r => setTimeout(r,400)); measureSectionPositions();
                const container = $readerContainer; const sh = container.scrollHeight; const ch = container.clientHeight;
                if (typeof progress.scrollTop === 'number' && progress.scrollTop>0 && progress.scrollTop<sh) container.scrollTop = progress.scrollTop;
                else container.scrollTop = Math.max(0, (progress.globalPage/(progress.totalPages||1))*(sh-ch));
                setTimeout(() => { if (container.scrollTop<5 && progress.scrollTop>100) container.scrollTop = progress.scrollTop; isRestoring = false; measureSectionPositions(); updatePositionFromScroll(); }, 400);
            }

            function closeReader() {
                cleanupScrollDetection(); $readerContainer.innerHTML = ''; sectionDOMRefs = [];
                currentBookId = null; currentBookData = null; globalCharMapping = null;
                lastRawData = { globalPage:-1, chapterIdx:-1, chapterPage:-1 }; isRestoring = false;
                $readerScreen.classList.add('hidden'); $libraryScreen.classList.remove('hidden');
                if (history.state && history.state.screen==='reader') history.back();
                renderLibrary();
            }

            window.addEventListener('popstate', (e) => { if (e.state && e.state.screen==='reader') closeReader(); });

            // ---------- BÚSQUEDA ----------
            function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
            function performSearch(term) {
                if (!term || term.length<2) { $searchResultsList.innerHTML = '<p style="text-align:center;color:#999;">Introduce al menos 2 caracteres</p>'; return; }
                const text = $readerContainer.innerText || ''; const regex = new RegExp(escapeRegExp(term),'gi'); const matches = []; let match;
                while ((match = regex.exec(text)) !== null) { const charIndex = match.index; const { globalPage, percent } = getGlobalPageFromCharIndex(charIndex); const start = Math.max(0, charIndex-40); const end = Math.min(text.length, charIndex+term.length+40); let context = text.substring(start,end); if (start>0) context = '…'+context; if (end<text.length) context += '…'; matches.push({ charIndex, context, globalPage, percent }); if (matches.length>=50) break; }
                if (matches.length===0) { $searchResultsList.innerHTML = '<p style="text-align:center;color:#999;">Sin resultados</p>'; return; }
                let html = ''; matches.forEach(m => { const highlightedContext = m.context.replace(new RegExp(escapeRegExp(term),'gi'), `<span class="highlight">$&</span>`); html += `<div class="search-result-item" data-position="${m.charIndex}"><div>${highlightedContext}</div><div class="meta">Pág. ${m.globalPage} · ${m.percent}%</div></div>`; });
                $searchResultsList.innerHTML = html;
                document.querySelectorAll('.search-result-item').forEach(item => { item.addEventListener('click', function() { const pos = parseInt(this.dataset.position); const walker = document.createTreeWalker($readerContainer, NodeFilter.SHOW_TEXT, null, false); let currentPos = 0, targetNode = null, offset = 0; while (walker.nextNode()) { const node = walker.currentNode; const len = node.textContent.length; if (currentPos+len > pos) { targetNode = node; offset = pos - currentPos; break; } currentPos += len; } if (targetNode) { const range = document.createRange(); range.setStart(targetNode, Math.min(offset, targetNode.length)); range.collapse(true); const rect = range.getClientRects()[0]; if (rect) { const containerRect = $readerContainer.getBoundingClientRect(); const scrollTop = rect.top - containerRect.top + $readerContainer.scrollTop - 100; $readerContainer.scrollTo({ top: scrollTop, behavior:'smooth' }); } } $searchResultsOverlay.classList.remove('active'); }); });
            }

            $btnSearch.addEventListener('click', () => { if (!searchRowVisible) { searchRowVisible = true; $footerCollapsible.classList.add('search-active'); $searchRow.classList.add('active'); $searchInput.focus(); updateContainerPadding(); } else { searchRowVisible = false; $footerCollapsible.classList.remove('search-active'); $searchRow.classList.remove('active'); updateContainerPadding(); } });
            $btnSearchResults.addEventListener('click', () => { const term = $searchInput.value.trim(); performSearch(term); $searchResultsOverlay.classList.add('active'); });
            $btnSearchClose.addEventListener('click', () => { searchRowVisible = false; $footerCollapsible.classList.remove('search-active'); $searchRow.classList.remove('active'); $searchInput.value = ''; updateContainerPadding(); });
            $searchInput.addEventListener('keydown', (e) => { if (e.key==='Enter') { const term = $searchInput.value.trim(); performSearch(term); $searchResultsOverlay.classList.add('active'); } });
            $searchResultsOverlay.addEventListener('click', (e) => { if (e.target === $searchResultsOverlay) $searchResultsOverlay.classList.remove('active'); });

            // ---------- CAPÍTULOS ----------
            $btnChapters.addEventListener('click', () => { if (!currentBookData?.structure?.sections) return; const sections = currentBookData.structure.sections; $chaptersList.innerHTML = ''; sections.forEach((s,i) => { const div = document.createElement('div'); div.className = 'chapter-item'; const startPage = (s.globalStartPage||0)+1; div.innerHTML = `<span class="chapter-title">${i+1}. ${escapeHtml(s.title)}</span><span class="chapter-page">Pág. ${startPage}</span>`; div.addEventListener('click', () => { const markers = $readerContainer.querySelectorAll('.chapter-marker'); if (markers[i]) { const top = markers[i].getBoundingClientRect().top - $readerContainer.getBoundingClientRect().top + $readerContainer.scrollTop; $readerContainer.scrollTo({ top, behavior:'smooth' }); } $chaptersOverlay.classList.remove('active'); }); $chaptersList.appendChild(div); }); $chaptersOverlay.classList.add('active'); });
            $chaptersOverlay.addEventListener('click', (e) => { if (e.target === $chaptersOverlay) $chaptersOverlay.classList.remove('active'); });

            $btnBackLibrary.addEventListener('click', () => { if (saveTimer) { clearTimeout(saveTimer); if (lastRawData.globalPage>0 && currentBookId) dbSaveProgress(currentBookId, { globalPage:lastRawData.globalPage, spineIndex:lastRawData.chapterIdx, pageInChapter:lastRawData.chapterPage, scrollTop:$readerContainer.scrollTop, totalPages: currentBookData?.structure?.totalPages||0 }); } closeReader(); });

            // ---------- Eventos ----------
            $uploadFab.addEventListener('click', () => $fileInput.click());
            $fileInput.addEventListener('change', async (e) => { const file = e.target.files[0]; if (!file) return; if (!file.name.toLowerCase().endsWith('.epub')) { alert('Solo archivos .epub'); $fileInput.value = ''; return; } const book = await uploadAndProcessBook(file); $fileInput.value = ''; if (book) renderLibrary(); });
            document.addEventListener('dragover', e => e.preventDefault());
            document.addEventListener('drop', async (e) => { e.preventDefault(); const file = e.dataTransfer.files[0]; if (file && file.name.endsWith('.epub')) { const book = await uploadAndProcessBook(file); if (book) renderLibrary(); } });
            window.addEventListener('beforeunload', () => { if (saveTimer && currentBookId && lastRawData.globalPage>0) { clearTimeout(saveTimer); dbSaveProgress(currentBookId, { globalPage:lastRawData.globalPage, spineIndex:lastRawData.chapterIdx, pageInChapter:lastRawData.chapterPage, scrollTop:$readerContainer.scrollTop, totalPages: currentBookData?.structure?.totalPages||0 }); } });

            (async () => { await openDB(); await renderLibrary(); console.log('📚 Lector ePub v43 listo (porcentaje igual al tiempo)'); })().catch(err => console.error('Error inicial:', err));
        })();
    </script>
